name: publish
on:
  schedule:
    - cron: "7 * * * *"        # hourly at :07 (avoids top-of-hour congestion)
  workflow_dispatch:            # manual run button
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests feedparser

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/run.py

      - name: Commit updated stories.json
        run: |
          git config user.name "settlewire-bot"
          git config user.email "bot@users.noreply.github.com"
          git add site/stories.json
          git diff --cached --quiet || git commit -m "stories: hourly update"
          git push

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
